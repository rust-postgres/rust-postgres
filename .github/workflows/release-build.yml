name: Release Build

on:
  push:
    tags:
      - "v*"
      - "gaussdb-mcp-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version override (e.g. 0.1.0)"
        required: false
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: gaussdb-mcp

jobs:
  build-linux-x86_64:
    name: Build linux-x86_64 (glibc ≥ 2.17)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Zig
        uses: mlugg/setup-zig@v1
        with:
          version: "0.13.0"

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev

      - name: Build
        run: cargo zigbuild --release -p gaussdb-mcp --target x86_64-unknown-linux-gnu.2.17

      - name: Strip
        run: strip --strip-unneeded target/x86_64-unknown-linux-gnu/release/${{ env.BINARY_NAME }}

      - name: Set version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#gaussdb-mcp-v}"
          VERSION="${VERSION#v}"
          [ -n "${{ inputs.version }}" ] && VERSION="${{ inputs.version }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARTIFACT_NAME="${{ env.BINARY_NAME }}-${VERSION}-x86_64-unknown-linux-gnu"
          mkdir -p "${ARTIFACT_NAME}"
          cp "target/x86_64-unknown-linux-gnu/release/${{ env.BINARY_NAME }}" "${ARTIFACT_NAME}/"
          cp README.md "${ARTIFACT_NAME}/" 2>/dev/null || true
          tar czf "${ARTIFACT_NAME}.tar.gz" "${ARTIFACT_NAME}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gaussdb-mcp-linux-x86_64
          path: "*.tar.gz"

  build-linux-arm64:
    name: Build linux-arm64 (glibc ≥ 2.17)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install Zig
        uses: mlugg/setup-zig@v1
        with:
          version: "0.13.0"

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild

      - name: Install system deps (arm64)
        run: |
          sudo dpkg --add-architecture arm64
          sudo find /etc/apt -name '*.list' -exec sed -i '/arch=/!s/^deb /deb [arch=amd64] /' {} \;
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy main restricted" | sudo tee /etc/apt/sources.list.d/arm64.list
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev binutils-aarch64-linux-gnu
          apt-get download libdbus-1-dev:arm64 libdbus-1-3:arm64
          mkdir -p /tmp/arm64-sysroot
          for deb in libdbus*.deb; do dpkg-deb -x "$deb" /tmp/arm64-sysroot; done

      - name: Build
        env:
          PKG_CONFIG_PATH: /tmp/arm64-sysroot/usr/lib/aarch64-linux-gnu/pkgconfig
          PKG_CONFIG_SYSROOT_DIR: /tmp/arm64-sysroot
          PKG_CONFIG_ALLOW_CROSS: 1
        run: cargo zigbuild --release -p gaussdb-mcp --target aarch64-unknown-linux-gnu.2.17

      - name: Strip
        run: aarch64-linux-gnu-strip --strip-unneeded target/aarch64-unknown-linux-gnu/release/${{ env.BINARY_NAME }}

      - name: Set version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#gaussdb-mcp-v}"
          VERSION="${VERSION#v}"
          [ -n "${{ inputs.version }}" ] && VERSION="${{ inputs.version }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARTIFACT_NAME="${{ env.BINARY_NAME }}-${VERSION}-aarch64-unknown-linux-gnu"
          mkdir -p "${ARTIFACT_NAME}"
          cp "target/aarch64-unknown-linux-gnu/release/${{ env.BINARY_NAME }}" "${ARTIFACT_NAME}/"
          cp README.md "${ARTIFACT_NAME}/" 2>/dev/null || true
          tar czf "${ARTIFACT_NAME}.tar.gz" "${ARTIFACT_NAME}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gaussdb-mcp-linux-arm64
          path: "*.tar.gz"

  build-windows-x86_64:
    name: Build windows-x86_64
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build
        run: cargo build --release -p gaussdb-mcp --target x86_64-pc-windows-msvc
        env:
          RUSTFLAGS: "-C target-feature=+crt-static"

      - name: Set version
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#gaussdb-mcp-v}"
          VERSION="${VERSION#v}"
          [ -n "${{ inputs.version }}" ] && VERSION="${{ inputs.version }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Package
        shell: pwsh
        run: |
          $VERSION = "${{ steps.version.outputs.version }}"
          $ARTIFACT_NAME = "${{ env.BINARY_NAME }}-${VERSION}-x86_64-pc-windows-msvc"
          New-Item -ItemType Directory -Force -Path $ARTIFACT_NAME
          Copy-Item "target/x86_64-pc-windows-msvc/release/${{ env.BINARY_NAME }}.exe" -Destination $ARTIFACT_NAME
          if (Test-Path README.md) { Copy-Item README.md -Destination $ARTIFACT_NAME }
          Compress-Archive -Path $ARTIFACT_NAME -DestinationPath "${ARTIFACT_NAME}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gaussdb-mcp-windows-x86_64
          path: "*.zip"

  release:
    name: Create GitHub Release
    needs: [build-linux-x86_64, build-linux-arm64, build-windows-x86_64]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate SHA256 checksums
        run: |
          cd artifacts
          shopt -s nullglob
          FILES=(*.tar.gz *.zip)
          if [ ${#FILES[@]} -gt 0 ]; then
            sha256sum "${FILES[@]}" > ../SHA256SUMS.txt
          fi

      - name: Determine tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="gaussdb-mcp-v${{ inputs.version }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            SHA256SUMS.txt
