version: '2'
services:
  postgres:
    image: docker.io/postgres:18
    ports:
      - 5433:5433
    volumes:
      - ./docker/sql_setup.sh:/docker-entrypoint-initdb.d/sql_setup.sh
    environment:
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U postgres -p 5433"]
      interval: 1s
      timeout: 5s
      retries: 30
